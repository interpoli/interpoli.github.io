site_name: Grupo de Pesquisa INTERPOLI
site_description: Website oficial do laboratório INTERPOLI.

theme:
  name: material
  language: pt-BR
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Mudar para modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Mudar para modo claro
  features:
    - navigation.tabs        # Menu horizontal bonito no topo
    - search.expand         # Faz a barra de pesquisa ficar aberta e elegante no topo igual ao padrão comercial
  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - search

extra_css:
  - stylesheets/extra.css

nav:
  - Início: index.md
  - Pesquisadores: pesquisadores.md
  - Canais: canais.md

# ==========================================================================
# CONFIGURAÇÕES EXTRAS UNIFICADAS
# ==========================================================================
extra:
  analytics:
    provider: google
  custom_colors:
    primary: "#1e366a"
  copyright: "© Grupo de Pesquisa INTERPOLI, Todos os direitos reservados"
  social:
    - icon: material/database      # Ícone do CNPq
      link: http://dgp.cnpq.br/dgp/espelhogrupo/5518890102674013
      name: Diretório de Grupos de Pesquisa (CNPq)
    - icon: material/email
      link: 'mailto:interpoli@usp.br'
      name: Enviar E-mail
    - icon: material/instagram
      link: https://www.instagram.com/interpoliusp/
      name: Instagram
