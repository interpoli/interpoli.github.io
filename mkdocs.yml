site_name: Grupo de Pesquisa INTERPOLI
site_description: Website oficial do laboratório INTERPOLI.

theme:
  name: material
  language: pt-BR
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Mudar para modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Mudar para modo claro
  features:
    - navigation.tabs       # Menu horizontal bonito no topo
    - search.expand        # Faz a barra de pesquisa ficar aberta e elegante no topo igual ao padrão comercial

extra:
  analytics:
    provider: google
  custom_colors:
    primary: "#1e366a"
    
  # CONFIGURAÇÃO DA FONTE (Exatamente a fonte sem serifa e moderna da imagem)
  font:
    text: Roboto
    code: Roboto Mono

# CONFIGURAÇÃO DA BARRA DE PESQUISA AUTOMÁTICA
plugins:
  - search

extra_css:
  - stylesheets/extra.css

nav:
  - Início: index.md
  - Pesquisadores: pesquisadores.md

# ==========================================================================
# TODAS AS CONFIGURAÇÕES EXTRAS UNIFICADAS E COM O ESPAÇAMENTO CORRETO
# ==========================================================================
extra:
  analytics:
    provider: google
  custom_colors:
    primary: "#1e366a"
    
  font:
    text: Roboto
    code: Roboto Mono

  # Altera o texto de Copyright para o seu nome com destaque
  copyright: |
    <span style="font-size: 18px; font-weight: 700; letter-spacing: 0.5px; color: #ffffff;">ALVES</span> 
    <br>
    <span style="font-size: 13px; opacity: 0.7;">Grupo de Pesquisa INTERPOLI</span>

  # Adiciona os ícones de contato elegantes e organizados no canto inferior
  social:
    - icon: material/school      # Ícone do CNPq
      link: http://dgp.cnpq.br/dgp/espelhogrupo/5518890102674013
      name: Diretório de Grupos de Pesquisa (CNPq)
    - icon: material/email
      link: mailto:interpoli@usp.br
      name: Enviar E-mail
    - icon: material/instagram
      link: https://www.instagram.com/interpoliusp/
      name: Instagram
