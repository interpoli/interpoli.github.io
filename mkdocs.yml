site_name: Grupo de Pesquisa INTERPOLI
site_description: Website oficial do laboratório INTERPOLI.

theme:
  name: material
  language: pt-BR
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Mudar para modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Mudar para modo claro
  features:
    - navigation.tabs       # Menu horizontal bonito no topo
    - search.expand         # Faz a barra de pesquisa ficar aberta

# CONFIGURAÇÃO DA BARRA DE PESQUISA AUTOMÁTICA
plugins:
  - search

extra_css:
  - stylesheets/extra.css

nav:
  - Início: index.md
  - Pesquisadores: pesquisadores.md

# ==========================================================================
# SEÇÃO EXTRA UNIFICADA (Apenas uma no arquivo inteiro)
# ==========================================================================
extra:
  analytics:
    provider: google
  custom_colors:
    primary: "#1e366a"
    
  font:
    text: Roboto
    code: Roboto Mono

  # Texto do Rodapé personalizado com Nome, Copyright e Licença CC 4.0
  copyright: |
    <div style="text-align: left; line-height: 1.6;">
      <span style="font-size: 18px; font-weight: 700; letter-spacing: 0.5px; color: #ffffff;">ALVES</span>
      <br>
      <span style="font-size: 13px; opacity: 0.9; color: #e1ecf7;">Grupo de Pesquisa INTERPOLI</span>
      <br><br>
      <span style="font-size: 12px; opacity: 0.7;">
        Copyright © Grupo de Pesquisa INTERPOLI. Conteúdos licenciados sob 
        <a href="https://creativecommons.org/licenses/by-nc/4.0/deed.pt-br" target="_blank" style="color: #e1ecf7; text-decoration: underline;">CC-BY-NC 4.0</a>.
      </span>
    </div>

  # Redes Sociais e Diretórios com os ícones atualizados
  social:
    - icon: material/database      # NOVO ÍCONE: Representa banco de dados/diretório de pesquisa
      link: http://dgp.cnpq.br/dgp/espelhogrupo/5518890102674013
      name: Diretório de Grupos de Pesquisa (CNPq)
    - icon: material/email
      link: mailto:interpoli@usp.br
      name: Enviar E-mail
    - icon: material/instagram
      link: https://www.instagram.com/interpoliusp/
      name: Instagram
