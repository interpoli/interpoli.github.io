site_name: Grupo de Pesquisa INTERPOLI
site_description: Website oficial do laboratório INTERPOLI.

theme:
  name: material
  language: pt-BR
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Mudar para modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Mudar para modo claro
  features:
    - navigation.tabs
    - search.suggest     # Melhora a barra de pesquisa deixando-a moderna

  # MUDAR A FONTE: Define a fonte limpa e moderna do exemplo
  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - search

extra_css:
  - stylesheets/extra.css

nav:
  - Início: index.md
  - Pesquisadores: pesquisadores.md
